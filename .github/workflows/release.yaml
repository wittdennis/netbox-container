name: github-release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        default: auto
        description: "Use auto to automatically calculate version"

jobs:
  release:
    uses: wittdennis/pipelines/.github/workflows/cog-release.yaml@52bf75a225e15cef3e2cc4e7fe47d0fc965f5733 # 2.0.9
    with:
      version: ${{ inputs.version }}
    secrets:
      release-token: ${{ secrets.RELEASE_TOKEN }}
