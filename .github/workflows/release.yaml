name: github-release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        default: auto
        description: "Use auto to automatically calculate version"

jobs:
  release:
    uses: wittdennis/pipelines/.github/workflows/cog-release.yaml@80d93272d8b0ad2988de6a14b6dca783ef97bb41 # 2.0.6
    with:
      version: ${{ inputs.version }}
    secrets:
      release-token: ${{ secrets.RELEASE_TOKEN }}
