name: github-release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        default: auto
        description: "Use auto to automatically calculate version"

jobs:
  release:
    uses: wittdennis/pipelines/.github/workflows/cog-release.yaml@6e03c6196a006a98ad426aab21abebd766749c46 # 2.0.8
    with:
      version: ${{ inputs.version }}
    secrets:
      release-token: ${{ secrets.RELEASE_TOKEN }}
